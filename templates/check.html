<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyze News | Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">Analyzing Content...</p>
    </div>

    <div class="container">
        <h1 class="title">Verify News</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-flash">⚠️ {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form id="verify-form" action="{{ url_for('result') }}" method="POST">
            
            <div class="method-card">
                <div class="input-group">
                    <label>News Headline</label>
                    <input type="text" name="title">
                </div>

                <div class="input-group">
                    <label>Article Content</label>
                    <textarea name="article" rows="5"></textarea>
                </div>
            </div>

            <div class="ui-divider"><span>OR UPLOAD IMAGE</span></div>

            <div class="method-card ocr-section">
                <input type="file" id="imageInput" accept="image/*">
                <p id="ocrStatus"></p>
            </div>

            <button type="submit" class="btn-submit">🚀 Run Analysis</button>
        </form>

        <div class="footer-nav">
            <a href="{{ url_for('home') }}" class="back-link">← Back</a>
        </div>
    </div>

    <!-- OCR LIBRARY -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <script>
    document.getElementById('verify-form').addEventListener('submit', function() {
        document.getElementById('loading-overlay').style.display = 'flex';
    });

    document.getElementById('imageInput').addEventListener('change', function () {
        const file = this.files[0];
        const status = document.getElementById('ocrStatus');

        if (!file) return;

        status.innerText = "Reading image...";

        Tesseract.recognize(
            file,
            'eng',
            {
                logger: m => {
                    status.innerText = "Processing: " + Math.round(m.progress * 100) + "%";
                }
            }
        ).then(({ data: { text } }) => {
            status.innerText = "OCR Complete ✅";
            document.querySelector('textarea[name="article"]').value = text;
        }).catch(err => {
            status.innerText = "OCR Failed ❌";
        });
    });
    </script>

</body>
</html>
