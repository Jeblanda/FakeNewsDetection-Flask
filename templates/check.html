<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyze News | Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- NEW: Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">Analyzing Content...</p>
    </div>

    <div class="container">
        <h1 class="title">Verify News</h1>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-flash">⚠️ {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form id="verify-form" action="{{ url_for('result') }}" method="POST" enctype="multipart/form-data">
            <div class="method-card">
                <div class="input-group">
                    <label>News Headline</label>
                    <input type="text" name="title" placeholder="Enter headline here...">
                </div>
                <div class="input-group">
                    <label>Article Content</label>
                    <textarea name="article" rows="5" placeholder="Paste full news body..."></textarea>
                </div>
            </div>

            <div class="ui-divider"><span>OR UPLOAD IMAGE</span></div>

            <div class="method-card ocr-section">
                <div class="input-group">
                    <input type="file" name="file" accept="image/*">
                </div>
            </div>

            <button type="submit" class="btn-submit">🚀 Run Analysis</button>
        </form>

        <div class="footer-nav">
            <a href="{{ url_for('home') }}" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        // Trigger loading screen on form submit
        document.getElementById('verify-form').addEventListener('submit', function() {
            document.getElementById('loading-overlay').style.display = 'flex';
        });
    </script>
</body>
</html>
